<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" fill="none">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1090" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F4EB"/>
      <stop offset="1" stop-color="#EFF4F8"/>
    </linearGradient>
