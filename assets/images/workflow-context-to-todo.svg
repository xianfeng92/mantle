  <text x="170" y="136" fill="#152233" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700">Workflow: Turn Context into Todo</text>
  <text x="170" y="172" fill="#607A8C" font-family="Helvetica, Arial, sans-serif" font-size="19">The clearest expression of Mantle’s context-aware identity.</text>

  <rect x="98" y="220" width="420" height="270" rx="22" fill="#F5ECDD" stroke="#D6CAB7"/>
  <text x="124" y="258" fill="#1D3347" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700">Context signals</text>
  <text x="124" y="300" fill="#615749" font-family="Helvetica, Arial, sans-serif" font-size="20">Foreground app: Xcode</text>
  <text x="124" y="332" fill="#615749" font-family="Helvetica, Arial, sans-serif" font-size="20">Window: Launch benchmark gate hardening</text>
  <text x="124" y="364" fill="#615749" font-family="Helvetica, Arial, sans-serif" font-size="20">Recent files: system-prompt.ts, summary.json</text>
  <rect x="124" y="402" width="150" height="32" rx="16" fill="#E7D7AE"/>
  <text x="148" y="423" fill="#5B4A1F" font-family="Helvetica, Arial, sans-serif" font-size="15">Current app aware</text>

  <rect x="654" y="220" width="398" height="270" rx="22" fill="#EBF7EF" stroke="#BCD8C5"/>
  <text x="680" y="258" fill="#1D3347" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700">Actionable output</text>
  <text x="680" y="304" fill="#27465D" font-family="Helvetica, Arial, sans-serif" font-size="20">• tighten the downloads conservative checks</text>
  <text x="680" y="336" fill="#27465D" font-family="Helvetica, Arial, sans-serif" font-size="20">• rerun replay + L2 gates</text>
  <text x="680" y="368" fill="#27465D" font-family="Helvetica, Arial, sans-serif" font-size="20">• update launch README screenshots</text>
  <rect x="680" y="404" width="152" height="34" rx="17" fill="#DDECF3"/>
  <text x="708" y="426" fill="#2B5068" font-family="Helvetica, Arial, sans-serif" font-size="15">Grounded output</text>

  <text x="98" y="526" fill="#527081" font-family="Helvetica, Arial, sans-serif" font-size="22">Mantle turns your current working context into next steps without forcing you to re-explain the room.</text>
